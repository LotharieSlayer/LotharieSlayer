name: Update README
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    name: Update this repo's README with recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_readme_cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&hide_border=true&icon_color=fff&bg_color=AF80FDe6&title_color=fff&text_color=fff&border_radius=20
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=LOTHARIE&api_domain=wakapi.alexisl.fr&bg_color=AF80FDe6&title_color=fff&icon_color=2F855A&text_color=fff&custom_title=Weekly%20Development%20Breakdown&layout=compact&border_radius=20&range=last_7_days&hide_border=true
          path: profile/wakapi.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
